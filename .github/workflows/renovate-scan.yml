# =============================================================================
# DEPRECATED — Ce workflow GitHub Actions est obsolète.
# =============================================================================
# L'exécution pour les projets GitHub est désormais assurée de manière
# centralisée depuis GitLab CI via :
#
#   .gitlab/renovate-scan-github.yml
#
# Le dashboard déclenche ce template en passant RUN_GITHUB=1 et TARGET_REPO
# via l'API GitLab trigger pipeline sur le projet renovate-ci.
#
# Aucun fichier CI n'est nécessaire dans les projets GitHub cibles.
# Voir README.md pour l'onboarding complet.
# =============================================================================

name: "[DEPRECATED] Renovate Scan"

on:
  workflow_dispatch:
    inputs:
      _notice:
        description: "Ce workflow est obsolète. Voir .gitlab/renovate-scan-github.yml"
        required: false
        default: "Voir README.md"

jobs:
  deprecated_notice:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "=========================================="
          echo "  Ce workflow est OBSOLÈTE."
          echo "  L'exécution GitHub est centralisée via"
          echo "  .gitlab/renovate-scan-github.yml"
          echo "  Voir README.md pour l'onboarding."
          echo "=========================================="
          exit 1
