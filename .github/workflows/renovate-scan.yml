name: Renovate Scan

on:
  workflow_dispatch:
    inputs:
      target_base_branch:
        description: "Base branch to scan"
        type: string
        default: "main"
      dry_run_mode:
        description: "Renovate dry-run mode: lookup | full | false"
        type: string
        default: "lookup"
  workflow_call:
    inputs:
      target_base_branch:
        description: "Base branch to scan"
        type: string
        default: "main"
      dry_run_mode:
        description: "Renovate dry-run mode: lookup | full | false"
        type: string
        default: "lookup"
    secrets:
      RENOVATE_TOKEN:
        description: "GitHub PAT with repo scope — or omit to use the automatic GITHUB_TOKEN"
        required: false
      DASHBOARD_WEBHOOK_URL:
        description: "Full URL to POST combined-report.json back to the dashboard"
        required: false

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  # ---------------------------------------------------------------------------
  # OSV vulnerability scan
  # ---------------------------------------------------------------------------
  osv_scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y jq procps

      - name: Install OSV scanner
        run: |
          wget -q https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -O /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Start performance monitor
        run: |
          rm -f /tmp/perf-metrics.jsonl
          touch /tmp/perf-metrics.jsonl
          (
            if [ -f /sys/fs/cgroup/cpu.stat ]; then CGROUP_V2=true; else CGROUP_V2=false; fi
            if date +%s%N 2>/dev/null | grep -q 'N$'; then HAS_NANO=false; else HAS_NANO=true; fi
            PREV_CPU_USAGE=0
            PREV_TIMESTAMP_NS=0
            while true; do
              if [ "$CGROUP_V2" = true ]; then
                CPU_USAGE_US=$(awk '/^usage_usec/ {print $2}' /sys/fs/cgroup/cpu.stat 2>/dev/null || echo 0)
                CPU_USAGE_NS=$((CPU_USAGE_US * 1000))
              else
                CPU_USAGE_NS=$(cat /sys/fs/cgroup/cpuacct/cpuacct.usage 2>/dev/null || cat /sys/fs/cgroup/cpu,cpuacct/cpuacct.usage 2>/dev/null || echo 0)
              fi
              if [ "$HAS_NANO" = true ]; then
                CURRENT_NS=$(date +%s%N 2>/dev/null || echo 0)
              else
                CURRENT_NS=$(date +%s 2>/dev/null || echo 0)000000000
              fi
              if [ "$PREV_CPU_USAGE" -gt 0 ] 2>/dev/null && [ "$PREV_TIMESTAMP_NS" -gt 0 ] 2>/dev/null; then
                DELTA_CPU=$((CPU_USAGE_NS - PREV_CPU_USAGE)) 2>/dev/null || DELTA_CPU=0
                DELTA_TIME=$((CURRENT_NS - PREV_TIMESTAMP_NS)) 2>/dev/null || DELTA_TIME=0
                if [ "$DELTA_TIME" -gt 0 ] 2>/dev/null; then
                  CPU_PERCENT=$((DELTA_CPU * 100 / DELTA_TIME)) 2>/dev/null || CPU_PERCENT=0
                else
                  CPU_PERCENT=0
                fi
              else
                CPU_PERCENT=0
              fi
              PREV_CPU_USAGE=$CPU_USAGE_NS
              PREV_TIMESTAMP_NS=$CURRENT_NS
              if [ "$CGROUP_V2" = true ]; then
                RAM_USED_BYTES=$(awk '/^anon / {print $2}' /sys/fs/cgroup/memory.stat 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo 0)
              else
                RAM_USED_BYTES=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.usage_in_bytes 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.limit_in_bytes 2>/dev/null || echo 0)
              fi
              if [ "$RAM_LIMIT_BYTES" = "max" ] || [ "$RAM_LIMIT_BYTES" -gt 100000000000 ] 2>/dev/null; then
                RAM_TOTAL_MB=$(awk '/^MemTotal:/ {printf "%d", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)
              else
                RAM_TOTAL_MB=$((RAM_LIMIT_BYTES / 1024 / 1024)) 2>/dev/null || RAM_TOTAL_MB=0
              fi
              RAM_USED_MB=$((RAM_USED_BYTES / 1024 / 1024)) 2>/dev/null || RAM_USED_MB=0
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              TOP_PROCS=$(ps -eo pid,%cpu,rss,comm --no-headers --sort=-rss 2>/dev/null \
                | head -5 \
                | awk '{pid=$1; cpu=$2; ram_mb=int($3/1024); cmd=$4; printf "{\"pid\":%s,\"cpu\":%s,\"ram_mb\":%d,\"command\":\"%s\"},", pid, cpu, ram_mb, cmd}' \
                | sed 's/,$//' 2>/dev/null || true)
              echo "{\"timestamp\":\"$TIMESTAMP\",\"cpu_percent\":$CPU_PERCENT,\"ram_used_mb\":$RAM_USED_MB,\"ram_total_mb\":$RAM_TOTAL_MB,\"top_processes\":[$TOP_PROCS]}" >> /tmp/perf-metrics.jsonl
              sleep 5
            done
          ) &
          echo $! > /tmp/perf-monitor.pid
          disown $(cat /tmp/perf-monitor.pid) 2>/dev/null || true
          echo "Performance monitor started (PID: $(cat /tmp/perf-monitor.pid))"

      - name: Generate Gradle lockfiles if needed
        run: |
          if [ -f build.gradle ] || [ -f build.gradle.kts ] || find . -maxdepth 3 -path "*/gradle/libs.versions.toml" 2>/dev/null | grep -q .; then
            if ! find . -name "gradle.lockfile" -maxdepth 3 2>/dev/null | grep -q .; then
              echo "Gradle project detected without lockfiles — parsing build files for OSV scan..."
              ALL_DEPS=$(mktemp)
          
              # ---- Strategy 1: Parse version catalog (libs.versions.toml) --------
              TOML_FILE=$(find . -maxdepth 3 -path "*/gradle/libs.versions.toml" 2>/dev/null | head -1)
              if [ -n "$TOML_FILE" ]; then
                echo "Found version catalog: $TOML_FILE"
                # Single awk pass: parse [versions] and [libraries], resolve and emit group:artifact:version
                # Compatible with mawk (no gawk capture groups) for ubuntu:noble
                awk '
                  function extract(s, key,    pat, idx, rest, val) {
                    # Extract value for key = "..." from an inline table string
                    idx = index(s, key)
                    if (idx == 0) return ""
                    rest = substr(s, idx + length(key))
                    gsub(/^[[:space:]]*=[[:space:]]*"/, "", rest)
                    idx = index(rest, "\"")
                    if (idx == 0) return ""
                    return substr(rest, 1, idx - 1)
                  }
                  function unquote(s) {
                    gsub(/^[[:space:]]*"/, "", s); gsub(/"[[:space:]]*$/, "", s)
                    return s
                  }
          
                  /^\[versions\]/      { section="versions"; next }
                  /^\[libraries\]/     { section="libraries"; next }
                  /^\[/                { section=""; next }
                  /^#/ || /^[[:space:]]*$/ { next }
          
                  section=="versions" {
                    split($0, kv, "=")
                    key = kv[1]; gsub(/[[:space:]]/, "", key)
                    val = ""; for (i=2; i<=length(kv); i++) { val = val (i>2?"=":"") kv[i] }
                    gsub(/^[[:space:]]*/, "", val); gsub(/[[:space:]]*$/, "", val)
                    if (val ~ /^\{/) {
                      # { strictly = "x" } or { prefer = "x" } — grab first quoted value
                      match(val, /"[^"]*"/)
                      val = substr(val, RSTART+1, RLENGTH-2)
                    } else {
                      val = unquote(val)
                    }
                    versions[key] = val
                    next
                  }
          
                  section=="libraries" {
                    split($0, kv, "=")
                    key = kv[1]; gsub(/[[:space:]]/, "", key)
                    val = ""; for (i=2; i<=length(kv); i++) { val = val (i>2?"=":"") kv[i] }
                    gsub(/^[[:space:]]*/, "", val); gsub(/[[:space:]]*$/, "", val)
          
                    group=""; artifact=""; version=""
          
                    if (val ~ /^"[^"]*"$/) {
                      # Short notation: "group:artifact:version"
                      tmp = unquote(val)
                      split(tmp, parts, ":")
                      if (length(parts) >= 3) { group=parts[1]; artifact=parts[2]; version=parts[3] }
                    } else {
                      # Inline table with module or group+name
                      mod = extract(val, "module")
                      if (mod != "") {
                        split(mod, mp, ":")
                        group = mp[1]; artifact = mp[2]
                      } else {
                        group = extract(val, "group")
                        artifact = extract(val, "name")
                      }
                      vref = extract(val, "version.ref")
                      if (vref != "") {
                        version = versions[vref]
                      } else {
                        version = extract(val, "version")
                      }
                    }
          
                    if (group != "" && artifact != "" && version != "") {
                      print group ":" artifact ":" version
                    }
                  }
                ' "$TOML_FILE" >> "$ALL_DEPS"
                echo "Extracted $(wc -l < "$ALL_DEPS" | tr -d ' ') dependencies from version catalog"
              fi
          
              # ---- Strategy 2: Parse build.gradle for inline coordinates ---------
              VARS_FILE=$(mktemp)
              for bf in $(find . -maxdepth 3 \( -name "build.gradle" -o -name "build.gradle.kts" \) 2>/dev/null); do
                sed -n "s/.*ext\.\([a-zA-Z_][a-zA-Z0-9_]*\)\s*=\s*[\"']\([^\"']*\)[\"'].*/\1=\2/p" "$bf" >> "$VARS_FILE"
                sed -n "s/.*\bdef\s\+\([a-zA-Z_][a-zA-Z0-9_]*\)\s*=\s*[\"']\([^\"']*\)[\"'].*/\1=\2/p" "$bf" >> "$VARS_FILE"
                sed -n "s/.*\bval\s\+\([a-zA-Z_][a-zA-Z0-9_]*\)\s*=\s*[\"']\([^\"']*\)[\"'].*/\1=\2/p" "$bf" >> "$VARS_FILE"
              done
          
              for bf in $(find . -maxdepth 3 \( -name "build.gradle" -o -name "build.gradle.kts" \) 2>/dev/null); do
                DEPS_FILE=$(mktemp)
          
                grep -E "^\s*(implementation|api|kapt|ksp|compileOnly|runtimeOnly|annotationProcessor|testImplementation|androidTestImplementation|classpath)" "$bf" \
                  | grep -oE "\"[a-zA-Z0-9._-]+:[a-zA-Z0-9._-]+:[^\"]*\"|'[a-zA-Z0-9._-]+:[a-zA-Z0-9._-]+:[^']*'" \
                  | sed "s/^[\"']//;s/[\"']$//" > "$DEPS_FILE" || true
          
                while IFS='=' read -r vname vvalue; do
                  [ -z "$vname" ] && continue
                  sed -i "s/\\\$$vname/$vvalue/g;s/\${$vname}/$vvalue/g" "$DEPS_FILE" 2>/dev/null || true
                done < "$VARS_FILE"
          
                grep -E '^[a-zA-Z0-9._-]+:[a-zA-Z0-9._-]+:[a-zA-Z0-9._+-]+$' "$DEPS_FILE" >> "$ALL_DEPS" || true
                rm -f "$DEPS_FILE"
              done
              rm -f "$VARS_FILE"
          
              # ---- Write synthetic lockfile at project root ----------------------
              RESOLVED=$(sort -u "$ALL_DEPS")
              if [ -n "$RESOLVED" ]; then
                {
                  echo "# Lockfile generated by CI for OSV vulnerability scanning"
                  echo "$RESOLVED" | while read -r dep; do echo "${dep}=compileClasspath,runtimeClasspath"; done
                  echo "empty="
                } > gradle.lockfile
                echo "Generated gradle.lockfile ($(echo "$RESOLVED" | wc -l | tr -d ' ') dependencies)"
              else
                echo "WARNING: No Gradle dependencies could be extracted"
              fi
              rm -f "$ALL_DEPS"
            fi
          fi

      - name: Run OSV scan
        run: |
          set +e
          /usr/local/bin/osv-scanner scan source --format=json --output=osv-report.json -r .
          OSV_EXIT_CODE=$?
          set -e
          
          # 0 = no vulns, 1 = vulns found (OK), >1 = scanner error
          if [ $OSV_EXIT_CODE -gt 1 ] && [ $OSV_EXIT_CODE -ne 128 ]; then
            echo "WARNING: OSV scanner returned error code $OSV_EXIT_CODE"
          fi
          
          if [ ! -f osv-report.json ]; then
            echo '{"results":[]}' > osv-report.json
          fi
          
          echo "OSV scan completed (exit code: $OSV_EXIT_CODE)"

      - name: Stop performance monitor
        if: always()
        run: |
          PERF_OUTPUT_FILE=osv-perf-metrics.json
          PERF_OUTPUT="${PERF_OUTPUT_FILE:-perf-metrics.json}"
          if [ -f /tmp/perf-monitor.pid ]; then
            PERF_PID=$(cat /tmp/perf-monitor.pid)
            kill "$PERF_PID" 2>/dev/null || true
            sleep 1
            echo "Performance monitor stopped (PID: $PERF_PID)"
          fi
          if [ -s /tmp/perf-metrics.jsonl ]; then
            echo "Raw JSONL lines: $(wc -l < /tmp/perf-metrics.jsonl)"
            if jq -s '.' /tmp/perf-metrics.jsonl > /tmp/perf-array.json 2>/dev/null; then
              mv /tmp/perf-array.json "$PERF_OUTPUT"
            else
              echo '[]' > "$PERF_OUTPUT"
            fi
            echo "Collected $(jq 'length' "$PERF_OUTPUT" 2>/dev/null || echo 0) performance samples in $PERF_OUTPUT"
          else
            echo '[]' > "$PERF_OUTPUT"
            echo "No performance metrics collected"
          fi

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: |
            osv-report.json
            osv-perf-metrics.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Trivy vulnerability scan — iOS/CocoaPods/SPM
  # ---------------------------------------------------------------------------
  trivy_scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y jq procps

      - name: Start performance monitor
        run: |
          rm -f /tmp/perf-metrics.jsonl
          touch /tmp/perf-metrics.jsonl
          (
            if [ -f /sys/fs/cgroup/cpu.stat ]; then CGROUP_V2=true; else CGROUP_V2=false; fi
            if date +%s%N 2>/dev/null | grep -q 'N$'; then HAS_NANO=false; else HAS_NANO=true; fi
            PREV_CPU_USAGE=0
            PREV_TIMESTAMP_NS=0
            while true; do
              if [ "$CGROUP_V2" = true ]; then
                CPU_USAGE_US=$(awk '/^usage_usec/ {print $2}' /sys/fs/cgroup/cpu.stat 2>/dev/null || echo 0)
                CPU_USAGE_NS=$((CPU_USAGE_US * 1000))
              else
                CPU_USAGE_NS=$(cat /sys/fs/cgroup/cpuacct/cpuacct.usage 2>/dev/null || cat /sys/fs/cgroup/cpu,cpuacct/cpuacct.usage 2>/dev/null || echo 0)
              fi
              if [ "$HAS_NANO" = true ]; then
                CURRENT_NS=$(date +%s%N 2>/dev/null || echo 0)
              else
                CURRENT_NS=$(date +%s 2>/dev/null || echo 0)000000000
              fi
              if [ "$PREV_CPU_USAGE" -gt 0 ] 2>/dev/null && [ "$PREV_TIMESTAMP_NS" -gt 0 ] 2>/dev/null; then
                DELTA_CPU=$((CPU_USAGE_NS - PREV_CPU_USAGE)) 2>/dev/null || DELTA_CPU=0
                DELTA_TIME=$((CURRENT_NS - PREV_TIMESTAMP_NS)) 2>/dev/null || DELTA_TIME=0
                if [ "$DELTA_TIME" -gt 0 ] 2>/dev/null; then
                  CPU_PERCENT=$((DELTA_CPU * 100 / DELTA_TIME)) 2>/dev/null || CPU_PERCENT=0
                else
                  CPU_PERCENT=0
                fi
              else
                CPU_PERCENT=0
              fi
              PREV_CPU_USAGE=$CPU_USAGE_NS
              PREV_TIMESTAMP_NS=$CURRENT_NS
              if [ "$CGROUP_V2" = true ]; then
                RAM_USED_BYTES=$(awk '/^anon / {print $2}' /sys/fs/cgroup/memory.stat 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo 0)
              else
                RAM_USED_BYTES=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.usage_in_bytes 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.limit_in_bytes 2>/dev/null || echo 0)
              fi
              if [ "$RAM_LIMIT_BYTES" = "max" ] || [ "$RAM_LIMIT_BYTES" -gt 100000000000 ] 2>/dev/null; then
                RAM_TOTAL_MB=$(awk '/^MemTotal:/ {printf "%d", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)
              else
                RAM_TOTAL_MB=$((RAM_LIMIT_BYTES / 1024 / 1024)) 2>/dev/null || RAM_TOTAL_MB=0
              fi
              RAM_USED_MB=$((RAM_USED_BYTES / 1024 / 1024)) 2>/dev/null || RAM_USED_MB=0
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              TOP_PROCS=$(ps -eo pid,%cpu,rss,comm --no-headers --sort=-rss 2>/dev/null \
                | head -5 \
                | awk '{pid=$1; cpu=$2; ram_mb=int($3/1024); cmd=$4; printf "{\"pid\":%s,\"cpu\":%s,\"ram_mb\":%d,\"command\":\"%s\"},", pid, cpu, ram_mb, cmd}' \
                | sed 's/,$//' 2>/dev/null || true)
              echo "{\"timestamp\":\"$TIMESTAMP\",\"cpu_percent\":$CPU_PERCENT,\"ram_used_mb\":$RAM_USED_MB,\"ram_total_mb\":$RAM_TOTAL_MB,\"top_processes\":[$TOP_PROCS]}" >> /tmp/perf-metrics.jsonl
              sleep 5
            done
          ) &
          echo $! > /tmp/perf-monitor.pid
          disown $(cat /tmp/perf-monitor.pid) 2>/dev/null || true
          echo "Performance monitor started (PID: $(cat /tmp/perf-monitor.pid))"

      - name: Check for iOS lockfiles and run Trivy
        run: |
          HAS_IOS=false
          if [ -f Podfile.lock ] || [ -f Package.resolved ] || [ -f Cartfile.resolved ]; then
            HAS_IOS=true
          fi
          echo "iOS lockfiles detected: $HAS_IOS"

          if [ "$HAS_IOS" = "true" ]; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin latest
            
            set +e
            trivy fs --scanners vuln --format json --output trivy-report.json .
            TRIVY_EXIT_CODE=$?
            set -e
            
            # Keep pipeline resilient: report generation should continue even if Trivy errors.
            if [ $TRIVY_EXIT_CODE -ne 0 ]; then
              echo "WARNING: Trivy returned exit code $TRIVY_EXIT_CODE"
            fi
            
            if [ ! -f trivy-report.json ]; then
              echo '{"Results":[]}' > trivy-report.json
            fi
            
            # Print an explicit summary so logs prove package extraction works.
            TRIVY_VULN_COUNT=$(jq -r '
              [
                (.Results[]? | (.Vulnerabilities // .vulnerabilities // [])[]?),
                (.results[]? | (.Vulnerabilities // .vulnerabilities // [])[]?)
              ] | flatten | length
            ' trivy-report.json 2>/dev/null || echo 0)
            TRIVY_PKG_COUNT=$(jq -r '
              [
                (.Results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName),
                (.results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName)
              ] | flatten | map(select(. != null and . != "")) | unique | length
            ' trivy-report.json 2>/dev/null || echo 0)
            echo "Trivy vulnerable packages detected: $TRIVY_PKG_COUNT"
            echo "Trivy vulnerabilities detected: $TRIVY_VULN_COUNT"
            if [ "$TRIVY_PKG_COUNT" -gt 0 ]; then
              echo "Trivy sample vulnerable packages (max 10):"
              jq -r '
                [
                  (.Results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName),
                  (.results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName)
                ] | flatten | map(select(. != null and . != "")) | unique | .[:10][]
              ' trivy-report.json 2>/dev/null || true
            fi
            
            echo "Trivy scan completed (exit code: $TRIVY_EXIT_CODE)"
          else
            echo "No iOS lockfiles detected — skipping Trivy scan."
            echo '{"Results":[]}' > trivy-report.json
          fi

      - name: Stop performance monitor
        if: always()
        run: |
          PERF_OUTPUT_FILE=trivy-perf-metrics.json
          PERF_OUTPUT="${PERF_OUTPUT_FILE:-perf-metrics.json}"
          if [ -f /tmp/perf-monitor.pid ]; then
            PERF_PID=$(cat /tmp/perf-monitor.pid)
            kill "$PERF_PID" 2>/dev/null || true
            sleep 1
            echo "Performance monitor stopped (PID: $PERF_PID)"
          fi
          if [ -s /tmp/perf-metrics.jsonl ]; then
            echo "Raw JSONL lines: $(wc -l < /tmp/perf-metrics.jsonl)"
            if jq -s '.' /tmp/perf-metrics.jsonl > /tmp/perf-array.json 2>/dev/null; then
              mv /tmp/perf-array.json "$PERF_OUTPUT"
            else
              echo '[]' > "$PERF_OUTPUT"
            fi
            echo "Collected $(jq 'length' "$PERF_OUTPUT" 2>/dev/null || echo 0) performance samples in $PERF_OUTPUT"
          else
            echo '[]' > "$PERF_OUTPUT"
            echo "No performance metrics collected"
          fi

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: |
            trivy-report.json
            trivy-perf-metrics.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Renovate run — uses scan results, opens PRs, posts report to dashboard
  # ---------------------------------------------------------------------------
  renovate_run:
    name: Renovate
    runs-on: ubuntu-latest
    needs: [osv_scan, trivy_scan]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y jq procps

      - name: Download OSV report
        uses: actions/download-artifact@v4
        with:
          name: osv-report
          path: .
        continue-on-error: true

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: .
        continue-on-error: true

      - name: Start performance monitor
        run: |
          rm -f /tmp/perf-metrics.jsonl
          touch /tmp/perf-metrics.jsonl
          (
            if [ -f /sys/fs/cgroup/cpu.stat ]; then CGROUP_V2=true; else CGROUP_V2=false; fi
            if date +%s%N 2>/dev/null | grep -q 'N$'; then HAS_NANO=false; else HAS_NANO=true; fi
            PREV_CPU_USAGE=0
            PREV_TIMESTAMP_NS=0
            while true; do
              if [ "$CGROUP_V2" = true ]; then
                CPU_USAGE_US=$(awk '/^usage_usec/ {print $2}' /sys/fs/cgroup/cpu.stat 2>/dev/null || echo 0)
                CPU_USAGE_NS=$((CPU_USAGE_US * 1000))
              else
                CPU_USAGE_NS=$(cat /sys/fs/cgroup/cpuacct/cpuacct.usage 2>/dev/null || cat /sys/fs/cgroup/cpu,cpuacct/cpuacct.usage 2>/dev/null || echo 0)
              fi
              if [ "$HAS_NANO" = true ]; then
                CURRENT_NS=$(date +%s%N 2>/dev/null || echo 0)
              else
                CURRENT_NS=$(date +%s 2>/dev/null || echo 0)000000000
              fi
              if [ "$PREV_CPU_USAGE" -gt 0 ] 2>/dev/null && [ "$PREV_TIMESTAMP_NS" -gt 0 ] 2>/dev/null; then
                DELTA_CPU=$((CPU_USAGE_NS - PREV_CPU_USAGE)) 2>/dev/null || DELTA_CPU=0
                DELTA_TIME=$((CURRENT_NS - PREV_TIMESTAMP_NS)) 2>/dev/null || DELTA_TIME=0
                if [ "$DELTA_TIME" -gt 0 ] 2>/dev/null; then
                  CPU_PERCENT=$((DELTA_CPU * 100 / DELTA_TIME)) 2>/dev/null || CPU_PERCENT=0
                else
                  CPU_PERCENT=0
                fi
              else
                CPU_PERCENT=0
              fi
              PREV_CPU_USAGE=$CPU_USAGE_NS
              PREV_TIMESTAMP_NS=$CURRENT_NS
              if [ "$CGROUP_V2" = true ]; then
                RAM_USED_BYTES=$(awk '/^anon / {print $2}' /sys/fs/cgroup/memory.stat 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo 0)
              else
                RAM_USED_BYTES=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.usage_in_bytes 2>/dev/null || echo 0)
                RAM_LIMIT_BYTES=$(cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.limit_in_bytes 2>/dev/null || echo 0)
              fi
              if [ "$RAM_LIMIT_BYTES" = "max" ] || [ "$RAM_LIMIT_BYTES" -gt 100000000000 ] 2>/dev/null; then
                RAM_TOTAL_MB=$(awk '/^MemTotal:/ {printf "%d", $2/1024}' /proc/meminfo 2>/dev/null || echo 0)
              else
                RAM_TOTAL_MB=$((RAM_LIMIT_BYTES / 1024 / 1024)) 2>/dev/null || RAM_TOTAL_MB=0
              fi
              RAM_USED_MB=$((RAM_USED_BYTES / 1024 / 1024)) 2>/dev/null || RAM_USED_MB=0
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              TOP_PROCS=$(ps -eo pid,%cpu,rss,comm --no-headers --sort=-rss 2>/dev/null \
                | head -5 \
                | awk '{pid=$1; cpu=$2; ram_mb=int($3/1024); cmd=$4; printf "{\"pid\":%s,\"cpu\":%s,\"ram_mb\":%d,\"command\":\"%s\"},", pid, cpu, ram_mb, cmd}' \
                | sed 's/,$//' 2>/dev/null || true)
              echo "{\"timestamp\":\"$TIMESTAMP\",\"cpu_percent\":$CPU_PERCENT,\"ram_used_mb\":$RAM_USED_MB,\"ram_total_mb\":$RAM_TOTAL_MB,\"top_processes\":[$TOP_PROCS]}" >> /tmp/perf-metrics.jsonl
              sleep 5
            done
          ) &
          echo $! > /tmp/perf-monitor.pid
          disown $(cat /tmp/perf-monitor.pid) 2>/dev/null || true
          echo "Performance monitor started (PID: $(cat /tmp/perf-monitor.pid))"

      - name: Prioritize vulnerable packages
        run: |
          OSV_PACKAGES=""
          TRIVY_PACKAGES=""
          
          if [ -f osv-report.json ]; then
            OSV_PACKAGES=$(jq -r '.results[]?.packages[]? | select(.vulnerabilities | length > 0) | .package.name // empty' osv-report.json 2>/dev/null | sort -u)
          fi
          
          if [ -f trivy-report.json ]; then
            TRIVY_PACKAGES=$(jq -r '
              [
                (.Results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName),
                (.results[]? | (.Vulnerabilities // .vulnerabilities // [])[]? | .PkgName)
              ]
              | flatten
              | .[]?
              | select(. != null and . != "")
            ' trivy-report.json 2>/dev/null | sort -u)
          fi
          
          VULNERABLE_PACKAGES=$(printf "%s\n%s\n" "$OSV_PACKAGES" "$TRIVY_PACKAGES" | sed '/^$/d' | sort -u)
          echo "OSV vulnerable packages count: $(printf "%s\n" "$OSV_PACKAGES" | sed '/^$/d' | wc -l | tr -d ' ')"
          echo "Trivy vulnerable packages count: $(printf "%s\n" "$TRIVY_PACKAGES" | sed '/^$/d' | wc -l | tr -d ' ')"
          echo "Merged vulnerable packages count: $(printf "%s\n" "$VULNERABLE_PACKAGES" | sed '/^$/d' | wc -l | tr -d ' ')"
          
          if [ -n "$VULNERABLE_PACKAGES" ]; then
            VULNERABLE_PACKAGES_CSV=$(printf "%s\n" "$VULNERABLE_PACKAGES" | paste -sd, -)
            echo "Vulnerable packages detected: $VULNERABLE_PACKAGES_CSV"
          
            PACKAGE_ARRAY_JSON=$(printf "%s\n" "$VULNERABLE_PACKAGES" | jq -Rsc 'split("\n") | map(select(length > 0))')
            RENOVATE_PACKAGE_RULES=$(jq -nc \
              --argjson pkgs "$PACKAGE_ARRAY_JSON" \
              '[{"matchPackageNames":$pkgs,"labels":["security","high-priority"],"prPriority":10}]')
            echo "RENOVATE_PACKAGE_RULES=$RENOVATE_PACKAGE_RULES" > /tmp/ci-env-exports.sh
          fi
          # Import env vars from shared script (GitHub: write to $GITHUB_ENV)
          if [ -f /tmp/ci-env-exports.sh ]; then
            while IFS='=' read -r key value; do
              [ -z "$key" ] && continue
              echo "$key=$value" >> "$GITHUB_ENV"
            done < /tmp/ci-env-exports.sh
          fi

      - name: Detect managers and build Renovate config
        run: |
          # Check for existing renovate config in the repo
          FOUND_CONFIG=""
          for cfg in renovate.json .renovaterc .renovaterc.json .github/renovate.json .github/.renovaterc; do
            if [ -f "$cfg" ]; then
              FOUND_CONFIG="$cfg"
              echo "Found Renovate config: $cfg"
              break
            fi
          done

          if [ -n "$FOUND_CONFIG" ]; then
            echo "RENOVATE_HAS_CONFIG=true" >> "$GITHUB_ENV"
          else
            # Auto-detect relevant package managers based on files present
            MANAGERS=""
            PACKAGE_RULES=""
            if [ -f Podfile ] || [ -f Podfile.lock ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"cocoapods\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group iOS CocoaPods updates\",\"matchManagers\":[\"cocoapods\"],\"groupName\":\"iOS CocoaPods dependencies\",\"labels\":[\"dependencies\",\"automated\",\"ios\",\"cocoapods\"]}"
            fi
            if [ -f Package.swift ] || [ -f Package.resolved ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"swift\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group iOS SPM updates\",\"matchManagers\":[\"swift\"],\"groupName\":\"iOS Swift Package Manager dependencies\",\"labels\":[\"dependencies\",\"automated\",\"ios\",\"spm\"]}"
            fi
            if [ -f build.gradle ] || [ -f build.gradle.kts ] || find . -maxdepth 2 -name "build.gradle*" 2>/dev/null | grep -q .; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"gradle\",\"gradle-wrapper\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Android Gradle updates\",\"matchManagers\":[\"gradle\",\"gradle-wrapper\"],\"groupName\":\"Android Gradle dependencies\",\"labels\":[\"dependencies\",\"automated\",\"android\",\"gradle\"]}"
            fi
            if [ -f package.json ] || [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f pnpm-lock.yaml ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"npm\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group npm updates\",\"matchManagers\":[\"npm\"],\"groupName\":\"Web npm dependencies\",\"labels\":[\"dependencies\",\"automated\",\"web\",\"npm\"]}"
            fi
            if [ -f Gemfile ] || [ -f Gemfile.lock ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"bundler\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Ruby/Rails updates\",\"matchManagers\":[\"bundler\"],\"groupName\":\"Web Ruby dependencies\",\"labels\":[\"dependencies\",\"automated\",\"web\",\"ruby\",\"bundler\"]}"
            fi
            if [ -f requirements.txt ] || [ -f poetry.lock ] || [ -f Pipfile ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"pip_requirements\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Python pip updates\",\"matchManagers\":[\"pip_requirements\"],\"groupName\":\"Python pip dependencies\",\"labels\":[\"dependencies\",\"automated\",\"python\",\"pip\"]}"
            fi
            if [ -f pubspec.yaml ] || [ -f pubspec.lock ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"pub\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Flutter/Dart updates\",\"matchManagers\":[\"pub\"],\"groupName\":\"Flutter Dart dependencies\",\"labels\":[\"dependencies\",\"automated\",\"dart\",\"pub\"]}"
            fi
            if [ -f go.mod ] || [ -f go.sum ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"gomod\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Go module updates\",\"matchManagers\":[\"gomod\"],\"groupName\":\"Go module dependencies\",\"labels\":[\"dependencies\",\"automated\",\"go\"]}"
            fi
            if [ -f Cargo.toml ] || [ -f Cargo.lock ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"cargo\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group Rust Cargo updates\",\"matchManagers\":[\"cargo\"],\"groupName\":\"Rust Cargo dependencies\",\"labels\":[\"dependencies\",\"automated\",\"rust\",\"cargo\"]}"
            fi
            if [ -f composer.json ] || [ -f composer.lock ]; then
              MANAGERS="${MANAGERS:+$MANAGERS,}\"composer\""
              PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}{\"description\":\"Group PHP Composer updates\",\"matchManagers\":[\"composer\"],\"groupName\":\"PHP Composer dependencies\",\"labels\":[\"dependencies\",\"automated\",\"php\",\"composer\"]}"
            fi
            
            echo "Detected managers: $MANAGERS"
            
            # Auto-detect runtime constraints so Renovate resolves compatible versions
            CONSTRAINTS=""
            RUBY_VERSION=""
            if [ -f .ruby-version ]; then
              RUBY_VERSION=$(head -1 .ruby-version | tr -d '[:space:]')
            elif [ -f .tool-versions ]; then
              RUBY_VERSION=$(awk '/^ruby / {print $2}' .tool-versions | tr -d '[:space:]')
            elif [ -f Gemfile ]; then
              RUBY_VERSION=$(sed -n "s/^ruby [\"']\([^\"']*\)[\"'].*/\1/p" Gemfile | head -1 | tr -d '[:space:]')
            fi
            if [ -n "$RUBY_VERSION" ]; then
              CONSTRAINTS="\"ruby\":\"$RUBY_VERSION\""
              echo "Detected Ruby version constraint: $RUBY_VERSION"
            fi
            
            NODE_VERSION=""
            if [ -f .node-version ]; then
              NODE_VERSION=$(head -1 .node-version | tr -d '[:space:]')
            elif [ -f .nvmrc ]; then
              NODE_VERSION=$(head -1 .nvmrc | tr -d '[:space:]')
            elif [ -f .tool-versions ]; then
              NODE_VERSION=$(awk '/^nodejs / {print $2}' .tool-versions | tr -d '[:space:]')
            fi
            if [ -n "$NODE_VERSION" ]; then
              CONSTRAINTS="${CONSTRAINTS:+$CONSTRAINTS,}\"node\":\"$NODE_VERSION\""
              echo "Detected Node version constraint: $NODE_VERSION"
            fi
            
            CONSTRAINTS_JSON=""
            if [ -n "$CONSTRAINTS" ]; then
              CONSTRAINTS_JSON=",\"constraints\":{$CONSTRAINTS}"
            fi
            
            # Common package rules (appended to ecosystem-specific ones)
            COMMON_RULES='{"matchCategories":["ruby"],"isVulnerabilityAlert":true,"groupName":"Ruby security updates","groupSlug":"rubygems-security","labels":["security","high-priority","ruby"]},{"matchCategories":["js"],"isVulnerabilityAlert":true,"groupName":"npm security updates","groupSlug":"npm-security","labels":["security","high-priority","npm"]},{"matchPackagePatterns":["*"],"isVulnerabilityAlert":true,"groupName":"Security updates","groupSlug":"security","labels":["security","high-priority"]},{"matchUpdateTypes":["patch"],"automerge":false,"labels":["patch-update"]},{"matchDepTypes":["devDependencies"],"labels":["dev-dependencies"],"automerge":false}'
            PACKAGE_RULES="${PACKAGE_RULES:+$PACKAGE_RULES,}$COMMON_RULES"
            
            # Write results to /tmp/ci-env-exports.sh for platform-specific consumption
            # Export as bash arrays and pre-computed JSON to avoid quoting issues
            {
              echo "MANAGERS='$MANAGERS'"
              echo "PACKAGE_RULES='$PACKAGE_RULES'"
              echo "CONSTRAINTS_JSON='$CONSTRAINTS_JSON'"
            } > /tmp/ci-env-exports.sh
            # Import detected managers
            if [ -f /tmp/ci-env-exports.sh ]; then
              . /tmp/ci-env-exports.sh
            fi

            RENOVATE_CONFIG='{"$schema":"https://docs.renovatebot.com/renovate-schema.json","extends":["config:recommended"],"enabled":true,"timezone":"Europe/Paris","automerge":false,"prHourlyLimit":10,"prConcurrentLimit":5,"ignorePaths":[".build/**","**/node_modules/**","**/Pods/**"],"osvVulnerabilityAlerts":true,"vulnerabilityAlerts":{"enabled":true,"labels":["security","vulnerability","high-priority"]},"dependencyDashboard":true,"reportTags":["security"],"rangeStrategy":"auto","postUpdateOptions":["bundlerConservative"],'
            if [ -n "$MANAGERS" ]; then
              RENOVATE_CONFIG="${RENOVATE_CONFIG}\"enabledManagers\":[$MANAGERS],"
            fi
            RENOVATE_CONFIG="${RENOVATE_CONFIG}\"packageRules\":[$PACKAGE_RULES],\"commitMessagePrefix\":\"chore:\",\"commitMessageAction\":\"update\",\"commitMessageTopic\":\"{{depName}}\",\"commitMessageExtra\":\"to {{newVersion}}{{#if isVulnerabilityAlert}} (security){{/if}}\"}"
            echo "RENOVATE_CONFIG=$RENOVATE_CONFIG" >> "$GITHUB_ENV"
            echo "Using centralized inline Renovate config (no renovate.json found in target repo)"
          fi

      - name: Determine dry-run flag
        run: |
          DRY_RUN_INPUT="${{ inputs.dry_run_mode }}"
          DRY_RUN_INPUT="${DRY_RUN_INPUT:-lookup}"

          if [ "${DRY_RUN_INPUT}" = "full" ]; then
            echo "RENOVATE_DRY_RUN=full" >> "$GITHUB_ENV"
            echo "Renovate dry-run mode: full"
          elif [ "${DRY_RUN_INPUT}" = "false" ]; then
            # Real mode: do NOT set RENOVATE_DRY_RUN — Renovate defaults to real mode when unset
            echo "Renovate dry-run mode: real (RENOVATE_DRY_RUN not set)"
          else
            echo "RENOVATE_DRY_RUN=lookup" >> "$GITHUB_ENV"
            echo "Renovate dry-run mode: lookup"
          fi

      - name: Set target repository for Renovate
        run: |
          REPO="${{ github.repository }}"
          echo "RENOVATE_REPOSITORIES=$REPO" >> "$GITHUB_ENV"
          echo "Renovate will scan: $REPO"

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.5
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN || github.token }}
          RENOVATE_PLATFORM: github
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@isee-u.fr>"
          RENOVATE_REPOSITORY_CACHE: enabled
          RENOVATE_BASE_BRANCHES: ${{ inputs.target_base_branch }}
          LOG_LEVEL: debug
          RENOVATE_EXPORT_SUMMARY: "true"
          RENOVATE_REPORT_PATH: renovate-report.json
          RENOVATE_POST_UPDATE_OPTIONS: '["bundlerConservative"]'
        with:
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
          renovate-version: latest

      - name: Create Renovate report from lockfiles
        if: always()
        run: |
          # Generate renovate-report.json structure with detected dependencies
          # This ensures gem updates are visible in the dashboard alongside CVEs

          REPO="${{ github.repository }}"
          REPORT_JSON='{
            "repositories": {
              "'$REPO'": {
                "repository": "'$REPO'",
                "branches": [],
                "packageFiles": {}
              }
            }
          }'

          # Check for Ruby/Bundler and extract gems
          if [ -f "Gemfile.lock" ]; then
            echo "Extracting Ruby gems from Gemfile.lock..."

            # Extract gems from the GEM section
            GEMS=$(awk '/^GEM$/,/^PLATFORMS$/ {
              if ($0 ~ /^  [a-z0-9_-]+ \(/) {
                match($0, /^  ([a-z0-9_-]+) \(([^)]+)\)/, m)
                printf "{\"depName\": \"%s\", \"currentVersion\": \"%s\", \"updates\": []}\n", m[1], m[2]
              }
            }' Gemfile.lock)

            if [ -n "$GEMS" ]; then
              # Convert newline-separated objects to JSON array
              DEPS_ARRAY=$(echo "$GEMS" | jq -s '.' 2>/dev/null || echo '[]')

              # Build the packageFiles structure
              REPORT_JSON=$(echo "$REPORT_JSON" | jq \
                --argjson deps "$DEPS_ARRAY" \
                '.repositories["'$REPO'"].packageFiles.bundler = [{"fileName": "Gemfile", "deps": $deps}]')
            fi
          fi

          # Save the report
          echo "$REPORT_JSON" | jq '.' > renovate-report.json

          # Validate
          if ! jq empty renovate-report.json 2>/dev/null; then
            echo '{}' > renovate-report.json
          fi

          echo "Created renovate-report.json with detected dependencies"

      - name: Stop performance monitor
        if: always()
        run: |
          PERF_OUTPUT_FILE=performance-metrics.json
          PERF_OUTPUT="${PERF_OUTPUT_FILE:-perf-metrics.json}"
          if [ -f /tmp/perf-monitor.pid ]; then
            PERF_PID=$(cat /tmp/perf-monitor.pid)
            kill "$PERF_PID" 2>/dev/null || true
            sleep 1
            echo "Performance monitor stopped (PID: $PERF_PID)"
          fi
          if [ -s /tmp/perf-metrics.jsonl ]; then
            echo "Raw JSONL lines: $(wc -l < /tmp/perf-metrics.jsonl)"
            if jq -s '.' /tmp/perf-metrics.jsonl > /tmp/perf-array.json 2>/dev/null; then
              mv /tmp/perf-array.json "$PERF_OUTPUT"
            else
              echo '[]' > "$PERF_OUTPUT"
            fi
            echo "Collected $(jq 'length' "$PERF_OUTPUT" 2>/dev/null || echo 0) performance samples in $PERF_OUTPUT"
          else
            echo '[]' > "$PERF_OUTPUT"
            echo "No performance metrics collected"
          fi

      - name: Build combined report
        if: always()
        run: |
          [ -f osv-report.json ]      || echo '{}' > osv-report.json
          [ -f trivy-report.json ]    || echo '{"Results":[]}' > trivy-report.json
          [ -f renovate-report.json ] || echo '{}' > renovate-report.json
          [ -f Package.resolved ]     || echo '{"pins":[]}' > Package.resolved
          [ -s performance-metrics.json ] || echo '[]' > performance-metrics.json
          [ -s osv-perf-metrics.json ]    || echo '[]' > osv-perf-metrics.json
          [ -s trivy-perf-metrics.json ]  || echo '[]' > trivy-perf-metrics.json

          jq -n --slurpfile osv osv-report.json \
                --slurpfile trivy trivy-report.json \
                --slurpfile renovate renovate-report.json \
                --slurpfile spm_resolved Package.resolved \
                --slurpfile perf performance-metrics.json \
                --slurpfile osv_perf osv-perf-metrics.json \
                --slurpfile trivy_perf trivy-perf-metrics.json \
                --arg timestamp "$(date -u -Iseconds)" \
                --arg pipeline_id "${{ github.run_id }}" \
                --arg commit_sha "${{ github.sha }}" \
                --arg branch "${{ inputs.target_base_branch }}" \
                --arg target_repo "${{ github.repository }}" \
                --arg platform "github" \
          '
          ($trivy[0].Results // $trivy[0].results // []) as $trivyResults |
          ($trivyResults | map((.Vulnerabilities // .vulnerabilities // [])) | flatten) as $trivyVulns |
          ($osv[0].results // []) as $osvResults |
          ($osvResults | map(.packages // []) | flatten) as $osvPackages |
          (($spm_resolved[0].pins // []) | map({(.identity): .location}) | add // {}) as $spm_urls |
          {
            "report": {
              "generated_at": $timestamp,
              "pipeline_id": $pipeline_id,
              "commit_sha": $commit_sha,
              "branch": $branch,
              "platform": $platform,
              "target_repo": $target_repo,
              "format_version": "1.0"
            },
            "security": {
              "osv_scanner": $osv[0],
              "trivy_scanner": $trivy[0],
              "summary": {
                "total_packages_with_vulnerabilities": (
                  (
                    [ $osvPackages[]? | select((.vulnerabilities | length) > 0) | .package.name ] +
                    [ $trivyVulns[]? | .PkgName ]
                  ) | map(select(. != null and . != "")) | unique | length
                ),
                "total_vulnerabilities": (
                  ([$osvPackages[]?.vulnerabilities[]?] | length) +
                  ($trivyVulns | length)
                ),
                "osv_total_vulnerabilities": ([$osvPackages[]?.vulnerabilities[]?] | length),
                "trivy_total_vulnerabilities": ($trivyVulns | length),
                "osv_vulnerable_packages": (
                  [
                    $osvPackages[]?
                    | select((.vulnerabilities | length) > 0)
                    | {
                        name: .package.name,
                        version: .package.version,
                        ecosystem: .package.ecosystem,
                        vulnerability_count: (.vulnerabilities | length),
                        vulnerabilities: [
                          .vulnerabilities[]
                          | {
                              id: .id,
                              summary: .summary,
                              severity: (.database_specific.severity // "UNKNOWN"),
                              cvss_vector: (.severity[0].score // null),
                              cvss_type: (.severity[0].type // null),
                              aliases: .aliases,
                              published: .published,
                              modified: .modified,
                              references: .references
                            }
                        ]
                      }
                  ]
                ),
                "trivy_vulnerable_packages": (
                  [
                    $trivyVulns[]?
                    | {
                        name: .PkgName,
                        version: .InstalledVersion,
                        fixed_version: .FixedVersion,
                        ecosystem: .PkgType,
                        vulnerability_id: .VulnerabilityID,
                        severity: .Severity,
                        title: (.Title // .Description // .PrimaryURL // "")
                      }
                  ]
                ),
                "cves": (
                  (
                    [$osvPackages[]?.vulnerabilities[]?.aliases[]? | select(test("^CVE-"))] +
                    [$trivyVulns[]?.VulnerabilityID | select(. != null and test("^CVE-"))]
                  ) | unique
                ),
                "severity_levels": (
                  (
                    [$osvPackages[]?.vulnerabilities[]?.database_specific?.severity? | select(. != null)] +
                    [$trivyVulns[]?.Severity | select(. != null)]
                  ) | unique
                ),
                "all_ios_packages": (
                  (
                    $trivyResults
                    | map(
                        . as $result |
                        ($result.Packages // [])
                        | map({
                            name: .Name,
                            version: (.Version // ""),
                            package_manager: ($result.Type | ascii_downcase)
                          })
                      )
                    | flatten
                    | map(select(.package_manager == "swift" or .package_manager == "cocoapods"))
                    | unique_by(.name)
                  ) as $ios_packages
                  |
                  (
                    ($spm_resolved[0].pins // [])
                    | map({
                        key_identity: (.identity // "" | ascii_downcase),
                        key_repo: ((.location // "" | split("/") | last | sub("\\.git$"; "") | ascii_downcase)),
                        location: .location
                      })
                  ) as $spm_entries
                  |
                  ($spm_entries | map({(.key_identity): .location}) | add // {}) as $spm_by_identity
                  |
                  ($spm_entries | map({(.key_repo): .location}) | add // {}) as $spm_by_repo
                  |
                  $ios_packages
                  | map(
                      . as $pkg
                      | ($pkg.name | ascii_downcase) as $name_lower
                      | ($name_lower | gsub("[^a-z0-9]"; "")) as $name_norm
                      | . + {
                          source_url: (
                            $spm_by_identity[$name_lower]
                            // $spm_by_repo[$name_lower]
                            // ([ $spm_entries[]? | select((.key_identity | gsub("[^a-z0-9]"; "")) == $name_norm) | .location ][0])
                            // ([ $spm_entries[]? | select((.key_repo | gsub("[^a-z0-9]"; "")) == $name_norm) | .location ][0])
                            // ([ $spm_entries[]?
                                  | select(
                                      (.key_identity | gsub("[^a-z0-9]"; "")) as $id_norm
                                      | ($id_norm | startswith($name_norm)) or ($name_norm | startswith($id_norm))
                                    )
                                  | .location
                               ][0])
                            // ([ $spm_entries[]?
                                  | select(
                                      (.key_repo | gsub("[^a-z0-9]"; "")) as $repo_norm
                                      | ($repo_norm | startswith($name_norm)) or ($name_norm | startswith($repo_norm))
                                    )
                                  | .location
                               ][0])
                            // null
                          )
                        }
                    )
                )
              }
            },
            "dependencies": {
              "renovate": $renovate[0],
              "summary": {
                "total_updates_available": ($renovate[0].updates // [] | length),
                "security_updates": ([$renovate[0].updates[]? | select(.hasVulnerabilityAlert == true)] | length),
                "update_types": ([$renovate[0].updates[]?.updateType // empty] | group_by(.) | map({type: .[0], count: length}))
              }
            },
            "recommendations": {
              "priority_actions": (
                if (([$osvPackages[]?.vulnerabilities[]?] | length) + ($trivyVulns | length)) > 0 then
                  ["Review security vulnerabilities immediately", "Apply security patches first", "Update vulnerable packages"]
                else
                  ["No security issues detected", "Review available dependency updates", "Continue regular maintenance"]
                end
              ),
              "vulnerable_packages_for_renovate": (
                (
                  [$osvPackages[]? | select((.vulnerabilities | length) > 0) | .package.name] +
                  [$trivyVulns[]? | .PkgName]
                ) | map(select(. != null and . != "")) | unique
              )
            },
            "performance": ($perf[0] // []),
            "performance_osv": ($osv_perf[0] // []),
            "performance_trivy": ($trivy_perf[0] // [])
          }
          ' > combined-report.json

      - name: Print summary
        if: always()
        run: |
          REPORT_HEADER="RENOVATE SUMMARY (${{ github.repository }})"
          if [ ! -f combined-report.json ]; then
            echo "No combined report generated"
            exit 0
          fi
          echo ""
          echo "=========================================="
          echo "      ${REPORT_HEADER:-RENOVATE SUMMARY}"
          echo "=========================================="
          jq -r '
            "Generated: " + .report.generated_at,
            "Pipeline:  " + .report.pipeline_id,
            (if .report.target_repo then "Repo:      " + .report.target_repo else empty end),
            "Branch:    " + .report.branch,
            "",
            "SECURITY:",
            "  Vulnerable packages: " + (.security.summary.total_packages_with_vulnerabilities | tostring),
            "  Total vulnerabilities: " + (.security.summary.total_vulnerabilities | tostring),
            "  OSV vulnerabilities: " + (.security.summary.osv_total_vulnerabilities | tostring),
            "  Trivy vulnerabilities: " + (.security.summary.trivy_total_vulnerabilities | tostring),
            (if .security.summary.cves | length > 0 then "  CVEs: " + (.security.summary.cves | join(", ")) else "  No CVEs found" end),
            "",
            "DEPENDENCIES:",
            "  Updates available: " + (.dependencies.summary.total_updates_available | tostring),
            "  Security updates: " + (.dependencies.summary.security_updates | tostring),
            "",
            "NEXT ACTIONS:",
            (.recommendations.priority_actions[] | "  > " + .)
          ' combined-report.json
          echo "=========================================="

      - name: POST report to dashboard
        if: always()
        run: |
          if [ ! -f combined-report.json ]; then
            echo "No combined report to send"
            exit 0
          fi

          WEBHOOK_URL="${{ secrets.DASHBOARD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "WARNING: DASHBOARD_WEBHOOK_URL not set — skipping report upload"
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /tmp/webhook-response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d @combined-report.json \
            "$WEBHOOK_URL")

          echo "Dashboard webhook response: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Report successfully sent to dashboard"
          else
            echo "WARNING: Dashboard returned HTTP $HTTP_STATUS"
            cat /tmp/webhook-response.txt 2>/dev/null || true
          fi
